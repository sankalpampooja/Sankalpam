<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Multi-Timezone Digital Clock</title>\n    <link rel=\"stylesheet\" href=\"style.css\">\n</head>\n<body>\n    <div class=\"container\">\n        <h1>Global Time Zone Clock</h1>\n        <p class=\"subtitle\">Current time across different time zones</p>\n        \n        <div class=\"controls\">\n            <label for=\"timezone-select\">Add Time Zone:</label>\n            <select id=\"timezone-select\">\n                <option value=\"\">Select a timezone...</option>\n                <optgroup label=\"Asia\">\n                    <option value=\"Asia/Kolkata\">India (IST) - UTC+5:30</option>\n                    <option value=\"Asia/Tokyo\">Tokyo (JST) - UTC+9:00</option>\n                    <option value=\"Asia/Shanghai\">Shanghai (CST) - UTC+8:00</option>\n                    <option value=\"Asia/Dubai\">Dubai (GST) - UTC+4:00</option>\n                    <option value=\"Asia/Hong_Kong\">Hong Kong (HKT) - UTC+8:00</option>\n                    <option value=\"Asia/Singapore\">Singapore (SGT) - UTC+8:00</option>\n                    <option value=\"Asia/Bangkok\">Bangkok (ICT) - UTC+7:00</option>\n                </optgroup>\n                <optgroup label=\"Europe\">\n                    <option value=\"Europe/London\">London (GMT/BST) - UTC+0:00/+1:00</option>\n                    <option value=\"Europe/Paris\">Paris (CET/CEST) - UTC+1:00/+2:00</option>\n                    <option value=\"Europe/Berlin\">Berlin (CET/CEST) - UTC+1:00/+2:00</option>\n                    <option value=\"Europe/Moscow\">Moscow (MSK) - UTC+3:00</option>\n                    <option value=\"Europe/Istanbul\">Istanbul (EET) - UTC+3:00</option>\n                </optgroup>\n                <optgroup label=\"Americas\">\n                    <option value=\"America/New_York\">New York (EST/EDT) - UTC-5:00/-4:00</option>\n                    <option value=\"America/Chicago\">Chicago (CST/CDT) - UTC-6:00/-5:00</option>\n                    <option value=\"America/Denver\">Denver (MST/MDT) - UTC-7:00/-6:00</option>\n                    <option value=\"America/Los_Angeles\">Los Angeles (PST/PDT) - UTC-8:00/-7:00</option>\n                    <option value=\"America/Toronto\">Toronto (EST/EDT) - UTC-5:00/-4:00</option>\n                    <option value=\"America/Mexico_City\">Mexico City (CST/CDT) - UTC-6:00/-5:00</option>\n                    <option value=\"America/Sao_Paulo\">São Paulo (BRT/BRST) - UTC-3:00/-2:00</option>\n                </optgroup>\n                <optgroup label=\"Africa\">\n                    <option value=\"Africa/Cairo\">Cairo (EET) - UTC+2:00</option>\n                    <option value=\"Africa/Johannesburg\">Johannesburg (SAST) - UTC+2:00</option>\n                    <option value=\"Africa/Lagos\">Lagos (WAT) - UTC+1:00</option>\n                </optgroup>\n                <optgroup label=\"Oceania\">\n                    <option value=\"Australia/Sydney\">Sydney (AEDT/AEST) - UTC+11:00/+10:00</option>\n                    <option value=\"Australia/Melbourne\">Melbourne (AEDT/AEST) - UTC+11:00/+10:00</option>\n                    <option value=\"Pacific/Auckland\">Auckland (NZDT/NZST) - UTC+13:00/+12:00</option>\n                </optgroup>\n            </select>\n            <button id=\"add-btn\">Add</button>\n        </div>\n\n        <div class=\"clock-grid\" id=\"clock-grid\">\n            <!-- Clocks will be added here dynamically -->\n        </div>\n    </div>\n\n    <script src=\"script.js\"></script>\n</body>\n</html>\n
